<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">Milo</div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="bubble">Hey, I'm Milo. How can I help you?</div>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" maxlength="2000" />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
